<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khóa học yêu thích - E-Learning</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .wishlist-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .wishlist-header {
            margin-bottom: 40px;
        }

        .wishlist-header h1 {
            font-size: 2rem;
            color: var(--gray-900);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .wishlist-header h1 i {
            color: #ef4444;
        }

        .wishlist-header p {
            color: var(--gray-600);
            font-size: 1.1rem;
        }

        .wishlist-count {
            background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .course-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .course-card {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            position: relative;
        }

        .course-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
        }

        .course-thumb {
            position: relative;
            height: 180px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .course-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .course-thumb i {
            font-size: 4rem;
            color: rgba(255,255,255,0.5);
        }

        .course-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: linear-gradient(135deg, #ef4444 0%, #f97316 100%);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .remove-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: #ef4444;
            font-size: 1rem;
        }

        .remove-btn:hover {
            background: #ef4444;
            color: white;
            transform: scale(1.1);
        }

        .course-content {
            padding: 20px;
        }

        .course-category {
            display: inline-block;
            background: var(--primary-bg);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .course-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .course-title a {
            color: inherit;
            text-decoration: none;
            transition: color 0.2s;
        }

        .course-title a:hover {
            color: var(--primary);
        }

        .course-desc {
            color: var(--gray-600);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .course-meta {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-top: 15px;
            border-top: 1px solid var(--gray-200);
            font-size: 0.85rem;
            color: var(--gray-500);
        }

        .course-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .course-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: var(--gray-50);
            border-top: 1px solid var(--gray-200);
        }

        .course-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .course-price.free {
            color: var(--secondary);
        }

        .btn-enroll {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-enroll:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .empty-state-icon {
            font-size: 5rem;
            color: #e5e7eb;
            margin-bottom: 20px;
        }

        .empty-state h2 {
            color: var(--gray-800);
            margin-bottom: 10px;
        }

        .empty-state p {
            color: var(--gray-600);
            margin-bottom: 25px;
        }

        .btn-browse {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-browse:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }

        .toast.success {
            background: #10b981;
        }

        .toast.error {
            background: #ef4444;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .wishlist-header h1 {
                font-size: 1.5rem;
            }

            .course-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <a href="index.html" class="logo">
                <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
                <span>E-Learning</span>
            </a>
            <nav class="nav">
                <ul class="nav-links">
                    <li><a href="index.html">Trang chủ</a></li>
                    <li><a href="courses.html">Khóa học</a></li>
                    <li><a href="my-courses.html">Khóa học của tôi</a></li>
                    <li><a href="wishlist.html" class="active">Yêu thích</a></li>
                </ul>
                <div class="nav-auth" id="nav-auth"></div>
            </nav>
        </div>
    </header>

    <main>
        <div class="wishlist-container">
            <div class="wishlist-header">
                <h1>
                    <i class="fas fa-heart"></i>
                    Khóa học yêu thích
                    <span class="wishlist-count" id="wishlist-count">0</span>
                </h1>
                <p>Danh sách các khóa học bạn đã lưu để học sau</p>
            </div>

            <div id="wishlist-content">
                <div class="loading-state" style="text-align: center; padding: 60px;">
                    <i class="fas fa-spinner fa-spin" style="font-size: 2rem; color: var(--primary);"></i>
                    <p style="margin-top: 15px; color: var(--gray-600);">Đang tải...</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 E-Learning. Tất cả quyền được bảo lưu.</p>
            </div>
        </div>
    </footer>

    <script src="js/api.js"></script>
    <script>
        // Auth check
        if (!auth.isLoggedIn()) {
            window.location.href = 'login.html?redirect=wishlist.html';
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateAuthNav();
            loadWishlists();
        });

        async function loadWishlists() {
            const container = document.getElementById('wishlist-content');

            try {
                const wishlists = await getWishlists();
                document.getElementById('wishlist-count').textContent = wishlists.length;

                if (wishlists.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">
                                <i class="fas fa-heart-broken"></i>
                            </div>
                            <h2>Chưa có khóa học yêu thích</h2>
                            <p>Hãy khám phá và lưu lại những khóa học bạn quan tâm!</p>
                            <a href="courses.html" class="btn-browse">
                                <i class="fas fa-compass"></i>
                                Khám phá khóa học
                            </a>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = `
                    <div class="course-grid">
                        ${wishlists.map(item => `
                            <div class="course-card" id="course-${item.course_id}">
                                <div class="course-thumb">
                                    ${item.course_thumbnail ? 
                                        `<img src="${item.course_thumbnail}" alt="${item.course_title}" onerror="this.style.display='none'">` : 
                                        ''}
                                    <i class="fas fa-book" style="${item.course_thumbnail ? 'display:none' : ''}"></i>
                                    <span class="course-badge">
                                        <i class="fas fa-heart"></i>
                                        Yêu thích
                                    </span>
                                    <button class="remove-btn" onclick="removeFromWishlistHandler(${item.course_id})" title="Xóa khỏi yêu thích">
                                        <i class="fas fa-times"></i>
                                    </button>
                                </div>
                                <div class="course-content">
                                    <span class="course-category">${item.category_name || 'Chưa phân loại'}</span>
                                    <h3 class="course-title">
                                        <a href="course-detail.html?id=${item.course_id}">${item.course_title}</a>
                                    </h3>
                                    <p class="course-desc">${item.course_description || 'Không có mô tả'}</p>
                                    <div class="course-meta">
                                        <span><i class="fas fa-book"></i> ${item.lesson_count || 0} bài</span>
                                        <span>
                                            <i class="fas fa-star" style="color: #fbbf24;"></i>
                                            ${item.average_rating || 0}
                                        </span>
                                    </div>
                                </div>
                                <div class="course-footer">
                                    <span class="course-price ${item.course_price == 0 ? 'free' : ''}">${formatPrice(item.course_price)}</span>
                                    <button class="btn-enroll" onclick="enrollFromWishlist(${item.course_id})">
                                        <i class="fas fa-graduation-cap"></i>
                                        Đăng ký
                                    </button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } catch (error) {
                console.error('Error loading wishlists:', error);
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <h2>Có lỗi xảy ra</h2>
                        <p>Không thể tải danh sách yêu thích. Vui lòng thử lại sau.</p>
                        <button onclick="loadWishlists()" class="btn-browse">
                            <i class="fas fa-redo"></i>
                            Thử lại
                        </button>
                    </div>
                `;
            }
        }

        async function removeFromWishlistHandler(courseId) {
            if (!confirm('Bạn có chắc muốn xóa khóa học này khỏi danh sách yêu thích?')) {
                return;
            }

            try {
                await removeFromWishlist(courseId);
                
                // Remove card from DOM with animation
                const card = document.getElementById(`course-${courseId}`);
                if (card) {
                    card.style.animation = 'slideOut 0.3s ease';
                    card.style.transform = 'translateX(100%)';
                    card.style.opacity = '0';
                    setTimeout(() => {
                        card.remove();
                        updateCount();
                    }, 300);
                }
                
                showToast('Đã xóa khỏi danh sách yêu thích', 'success');
            } catch (error) {
                showToast('Có lỗi xảy ra', 'error');
            }
        }

        async function enrollFromWishlist(courseId) {
            try {
                await enrollCourse(courseId);
                showToast('Đăng ký khóa học thành công!', 'success');
                
                // Remove from wishlist after enrolling
                await removeFromWishlist(courseId);
                
                const card = document.getElementById(`course-${courseId}`);
                if (card) {
                    card.remove();
                    updateCount();
                }
                
                // Redirect to learning
                setTimeout(() => {
                    window.location.href = `lesson-player.html?course=${courseId}`;
                }, 1000);
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        function updateCount() {
            const remaining = document.querySelectorAll('.course-card').length;
            document.getElementById('wishlist-count').textContent = remaining;
            
            if (remaining === 0) {
                document.getElementById('wishlist-content').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <i class="fas fa-heart-broken"></i>
                        </div>
                        <h2>Chưa có khóa học yêu thích</h2>
                        <p>Hãy khám phá và lưu lại những khóa học bạn quan tâm!</p>
                        <a href="courses.html" class="btn-browse">
                            <i class="fas fa-compass"></i>
                            Khám phá khóa học
                        </a>
                    </div>
                `;
            }
        }

        function showToast(message, type = 'success') {
            document.querySelectorAll('.toast').forEach(t => t.remove());
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
                ${message}
            `;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.animation = 'slideIn 0.3s ease reverse';
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        // Add animation style
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
